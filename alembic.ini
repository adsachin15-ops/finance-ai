# ============================================================
# Finance-AI — Alembic Configuration
# ============================================================
# Run migrations:
#   alembic upgrade head
#   alembic downgrade -1
#   alembic revision --autogenerate -m "description"
#   alembic history
#   alembic current
# ============================================================

[alembic]
# Path to migration scripts
script_location = database/migrations

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for generated migration files
timezone = UTC

# Max length of migration file slug
truncate_slug_length = 40

# SQLite database URL (overridden in env.py via settings)
sqlalchemy.url = sqlite:///database/finance.db

# ── Logging ───────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
